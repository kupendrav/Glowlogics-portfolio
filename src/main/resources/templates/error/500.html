<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 | Server Error</title>
    <style>
        :root { color-scheme: dark light; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at 20% 20%, #1d4ed855, transparent 45%), #0b1118;
            color: #e7eef8;
        }
        .card {
            width: min(560px, 92vw);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid #2e3c4d;
            background: #121b28cc;
            text-align: center;
        }
        h1 { font-size: 3.4rem; margin: 0; }
        p { color: #a9b8ca; }
        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>500</h1>
    <p>Something unexpected happened. Please try again in a moment.</p>
    <a href="/">Return Home</a>
</main>
</body>
</html>
