<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Portfolio</title>
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body data-theme="dark" class="admin-shell">
<main class="admin-login-wrap">
    <section class="admin-login-card">
        <h1>Admin Console</h1>
        <p>Sign in to manage projects and blog posts.</p>

        <div class="alert error" th:if="${param.error}">Invalid username or password.</div>
        <div class="alert success" th:if="${param.logout}">Logged out successfully.</div>

        <form method="post" action="/admin/login" class="admin-login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
            <button type="submit" class="btn btn-solid full-width">Sign in</button>
        </form>

        <a href="/" class="back-link">Back to portfolio</a>
    </section>
</main>
</body>
</html>
